name: Oreshnik STRAT-03 Operator Dispatch

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/oreshnik-strat03-register.yml"
  pull_request:
    branches:
      - master
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: oreshnik-strat03-operator-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    if: >-
      github.event_name != 'issue_comment' ||
      (github.event.issue.number == 16 && github.event.comment.body == '/oreshnik-strat03-dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TASK_ID: S-HC-STRAT-03-INTAKE-TO-ACTIVE-STRATEGY
      ORESHNIK_CLI: node node_modules/oreshnik-cli/dist/cli.js

    steps:
      - name: Checkout canonical master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure authenticated origin
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Manuel Vera via ChatGPT Operator"
          git config user.email "manuel@heptacore.dev"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/oreshnik/*:refs/oreshnik/*' || git fetch --prune origin
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/master)"
          echo "origin=https://github.com/${GITHUB_REPOSITORY}.git"
          echo "master=$(git rev-parse HEAD)"

      - name: Install locked dependencies
        run: npm ci

      - name: Verify canonical STRAT-03 registration
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const taskId = process.env.TASK_ID;
          const board = JSON.parse(fs.readFileSync('var/oreshnik/task-board.json', 'utf8'));
          const task = board.tasks.find((entry) => entry.id === taskId);
          if (!task) throw new Error(`Canonical task ${taskId} is absent from task-board`);
          if (!['ready', 'claimed', 'active'].includes(task.status)) {
            throw new Error(`Task ${taskId} is not dispatchable; status=${task.status}`);
          }
          console.log(JSON.stringify({ taskId: task.id, status: task.status, owner: task.owner, zones: task.zone }, null, 2));
          NODE

      - name: Capture initial readiness
        id: readiness_before
        shell: bash
        run: |
          set +e
          npm run oreshnik:ready 2>&1 | tee /tmp/strat03-readiness-before.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Register this GitHub Actions runner in Oreshnik
        id: init
        shell: bash
        run: |
          set -euo pipefail
          WORKTREE_ROOT="${RUNNER_TEMP}/oreshnik-wt"
          mkdir -p "$WORKTREE_ROOT"
          echo "worktree_root=$WORKTREE_ROOT" >> "$GITHUB_OUTPUT"
          $ORESHNIK_CLI dispatch init \
            --mother master \
            --worktree-root "$WORKTREE_ROOT" \
            --repo . \
            --json | tee /tmp/strat03-dispatch-init.json

      - name: Reconcile remote Oreshnik control plane
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/oreshnik/*:refs/oreshnik/*' || git fetch --prune origin
          $ORESHNIK_CLI dispatch reconcile --repo . --json | tee /tmp/strat03-dispatch-reconcile.json
          $ORESHNIK_CLI dispatch status --repo . --json | tee /tmp/strat03-dispatch-status-before.json

      - name: Oreshnik readiness after control-plane reconciliation
        shell: bash
        run: |
          set -euo pipefail
          npm run oreshnik:ready 2>&1 | tee /tmp/strat03-readiness-after.log

      - name: Explain exact target eligibility
        shell: bash
        run: |
          set -euo pipefail
          $ORESHNIK_CLI dispatch explain \
            --task "$TASK_ID" \
            --operator manuel \
            --repo . \
            --json | tee /tmp/strat03-dispatch-explain.json

      - name: Enter through Oreshnik goal as Manuel
        id: goal
        shell: bash
        run: |
          set -euo pipefail
          $ORESHNIK_CLI goal \
            --operator manuel \
            --harness shell \
            --task "$TASK_ID" \
            --auto-align \
            --repo . \
            --max-retries 3 \
            --json | tee /tmp/strat03-goal.json

          node - <<'NODE'
          const fs = require('node:fs');
          const goal = JSON.parse(fs.readFileSync('/tmp/strat03-goal.json', 'utf8'));
          if (!['assigned', 'resumed'].includes(goal.result)) {
            throw new Error(`Oreshnik goal did not assign/resume the task: ${goal.result}`);
          }
          if (goal.taskId !== process.env.TASK_ID) {
            throw new Error(`Oreshnik returned wrong task: ${goal.taskId}`);
          }
          const required = ['runId', 'assignmentId', 'claimId', 'operator', 'agentInstanceAlias', 'sessionId', 'functionalBranch', 'worktreePath'];
          for (const key of required) {
            if (!goal[key]) throw new Error(`Oreshnik goal omitted ${key}`);
          }
          const output = process.env.GITHUB_OUTPUT;
          const lines = [
            `run_id=${goal.runId}`,
            `assignment_id=${goal.assignmentId}`,
            `claim_id=${goal.claimId}`,
            `operator=${goal.operator}`,
            `instance=${goal.agentInstanceAlias}`,
            `session=${goal.sessionId}`,
            `branch=${goal.functionalBranch}`,
            `worktree=${goal.worktreePath}`,
          ];
          fs.appendFileSync(output, `${lines.join('\n')}\n`);
          console.log(JSON.stringify({
            result: goal.result,
            taskId: goal.taskId,
            runId: goal.runId,
            assignmentId: goal.assignmentId,
            claimId: goal.claimId,
            operator: goal.operator,
            instance: goal.agentInstanceAlias,
            session: goal.sessionId,
            branch: goal.functionalBranch,
            worktree: goal.worktreePath,
            zones: goal.zones,
          }, null, 2));
          NODE

      - name: Persist ChatGPT delegated-operator execution context on assigned branch
        shell: bash
        env:
          RUN_ID: ${{ steps.goal.outputs.run_id }}
          ASSIGNMENT_ID: ${{ steps.goal.outputs.assignment_id }}
          CLAIM_ID: ${{ steps.goal.outputs.claim_id }}
          INSTANCE: ${{ steps.goal.outputs.instance }}
          SESSION_ID: ${{ steps.goal.outputs.session }}
          FUNCTIONAL_BRANCH: ${{ steps.goal.outputs.branch }}
          WORKTREE_PATH: ${{ steps.goal.outputs.worktree }}
        run: |
          set -euo pipefail
          test -d "$WORKTREE_PATH/.git" -o -f "$WORKTREE_PATH/.git"
          cd "$WORKTREE_PATH"
          test "$(git branch --show-current)" = "$FUNCTIONAL_BRANCH"
          mkdir -p docs/oreshnik/executions
          cat > docs/oreshnik/executions/S-HC-STRAT-03-RUN.md <<EOF
          # STRAT-03 canonical execution

          - Task: \`$TASK_ID\`
          - Run: \`$RUN_ID\`
          - Assignment: \`$ASSIGNMENT_ID\`
          - Claim: \`$CLAIM_ID\`
          - Operator: \`manuel\`
          - Delegated operator interface: ChatGPT
          - Execution infrastructure: GitHub Actions
          - Oreshnik harness: \`shell\`
          - Agent instance: \`$INSTANCE\`
          - Session: \`$SESSION_ID\`
          - Functional branch: \`$FUNCTIONAL_BRANCH\`
          - Worktree: ephemeral GitHub Actions worktree governed by Oreshnik
          - Source issue: #16

          The prior Issue/PR/bootstrap artifacts were preparatory only. Canonical execution begins with the Oreshnik-generated Run, assignment, claim, branch and worktree recorded above.

          Product implementation must occur only on this functional branch and within the zones returned by Oreshnik. No merge, production deployment, live publication or campaign spend is authorized.
          EOF
          git add docs/oreshnik/executions/S-HC-STRAT-03-RUN.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(oreshnik): record STRAT-03 canonical run"
          fi
          git push --set-upstream origin "$FUNCTIONAL_BRANCH"

      - name: Verify control plane after assignment
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/oreshnik/*:refs/oreshnik/*' || git fetch --prune origin
          $ORESHNIK_CLI dispatch status --repo . --json | tee /tmp/strat03-dispatch-status-after.json

      - name: Report canonical Run to Issue 16
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.goal.outputs.run_id }}
          ASSIGNMENT_ID: ${{ steps.goal.outputs.assignment_id }}
          CLAIM_ID: ${{ steps.goal.outputs.claim_id }}
          INSTANCE: ${{ steps.goal.outputs.instance }}
          SESSION_ID: ${{ steps.goal.outputs.session }}
          FUNCTIONAL_BRANCH: ${{ steps.goal.outputs.branch }}
        run: |
          set -euo pipefail
          gh issue comment 16 --repo "$GITHUB_REPOSITORY" --body "## Oreshnik canonical execution created

- Task: \`$TASK_ID\`
- Run: \`$RUN_ID\`
- Assignment: \`$ASSIGNMENT_ID\`
- Claim: \`$CLAIM_ID\`
- Operator: \`manuel\`
- Delegated interface: ChatGPT
- Infrastructure: GitHub Actions
- Harness: \`shell\`
- Instance: \`$INSTANCE\`
- Session: \`$SESSION_ID\`
- Functional branch: \`$FUNCTIONAL_BRANCH\`

The Task is now governed by a real Oreshnik Run. Product implementation continues only on the assigned branch."

      - name: Upload canonical dispatch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oreshnik-strat03-canonical-dispatch
          path: |
            /tmp/strat03-readiness-before.log
            /tmp/strat03-readiness-after.log
            /tmp/strat03-dispatch-init.json
            /tmp/strat03-dispatch-reconcile.json
            /tmp/strat03-dispatch-status-before.json
            /tmp/strat03-dispatch-explain.json
            /tmp/strat03-goal.json
            /tmp/strat03-dispatch-status-after.json
          if-no-files-found: ignore
          retention-days: 14
